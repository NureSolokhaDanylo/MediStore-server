name: Build and Push WebApi to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: webapi-dockerhub
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push WebApi image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./WebApi/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

      - name: Remove old tags from Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
          KEEP_TAG: latest
        run: |
          set -euo pipefail

          login_payload=$(jq -n \
            --arg username "$DOCKERHUB_USERNAME" \
            --arg password "$DOCKERHUB_TOKEN" \
            '{username: $username, password: $password}')

          jwt_token=$(curl -fsS \
            -H 'Content-Type: application/json' \
            -X POST \
            -d "$login_payload" \
            https://hub.docker.com/v2/users/login/ | jq -r '.token')

          if [ -z "$jwt_token" ] || [ "$jwt_token" = "null" ]; then
            echo "Failed to get Docker Hub JWT token"
            exit 1
          fi

          tags_to_delete=()
          page=1
          while true; do
            tags_response=$(curl -fsS \
              -H "Authorization: JWT $jwt_token" \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPOSITORY/tags?page_size=100&page=$page")

            while IFS= read -r tag_name; do
              if [ "$tag_name" != "$KEEP_TAG" ]; then
                tags_to_delete+=("$tag_name")
              fi
            done < <(echo "$tags_response" | jq -r '.results[].name')

            next_page=$(echo "$tags_response" | jq -r '.next')
            if [ "$next_page" = "null" ]; then
              break
            fi

            page=$((page + 1))
          done

          for tag_name in "${tags_to_delete[@]}"; do
            echo "Deleting tag: $tag_name"
            curl -fsS -X DELETE \
              -H "Authorization: JWT $jwt_token" \
              "https://hub.docker.com/v2/repositories/$DOCKERHUB_USERNAME/$DOCKERHUB_REPOSITORY/tags/$tag_name/" >/dev/null
          done
